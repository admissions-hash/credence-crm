        meetingsAttended: { type: integer }
        assessmentsBooked: { type: integer }
        decayDays: { type: integer, description: Days since the most recent activity (or lead creation). }
        raw: { type: integer, description: Pre-cap score (positive contributions minus decay). }
        capped: { type: integer, description: Final score after the 0-100 cap. }
      required: [emailReplies, callsAnswered, meetingsAttended, assessmentsBooked, decayDays, raw, capped]

