          items: { $ref: "#/components/schemas/OwnerBackfillResultEntry" }
        totalLeadsUpdated: { type: integer }
        totalDealsUpdated: { type: integer }
        totalActivitiesUpdated: { type: integer }
      required: [results, totalLeadsUpdated, totalDealsUpdated, totalActivitiesUpdated]

    SearchHit:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        subtitle: { type: string, nullable: true }
        status: { type: string, nullable: true }
      required: [id, name]

    SearchResults:
      type: object
      properties:
        query: { type: string }
        leads:
          type: array
          items: { $ref: "#/components/schemas/SearchHit" }
        contacts:
          type: array
          items: { $ref: "#/components/schemas/SearchHit" }
        accounts:
          type: array
          items: { $ref: "#/components/schemas/SearchHit" }
        deals:
          type: array
          items: { $ref: "#/components/schemas/SearchHit" }
      required: [query, leads, contacts, accounts, deals]

    CustomPropertyRecordType:
      type: string
      enum: [lead, deal, account, contact]

    CustomPropertyType:
      type: string
      enum: [text, number, date, single_select, multi_select, boolean]

    CustomProperty:
      type: object
      properties:
        id: { type: string, format: uuid }
