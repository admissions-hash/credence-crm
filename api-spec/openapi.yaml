    LeadImportRow:
      type: object
      description: A row of CSV data being imported as a lead. All fields are optional strings; the server validates and coerces them.
      properties:
        firstName: { type: string }
        lastName: { type: string }
        email: { type: string }
        phone: { type: string }
        company: { type: string }
        title: { type: string }
        status: { type: string }
        source: { type: string }
        owner: { type: string }
        estimatedValue: { type: string }
        notes: { type: string }

    LeadImportInput:
      type: object
      properties:
        dryRun: { type: boolean }
        rows:
          type: array
          items: { $ref: "#/components/schemas/LeadImportRow" }
      required: [dryRun, rows]

    ContactImportRow:
      type: object
      description: A row of CSV data being imported as a contact. All fields are optional strings; the server validates and coerces them.
      properties:
        firstName: { type: string }
        lastName: { type: string }
        email: { type: string }
        phone: { type: string }
        title: { type: string }
        accountName: { type: string }
        notes: { type: string }

    ContactImportInput:
      type: object
      properties:
        dryRun: { type: boolean }
        rows:
          type: array
          items: { $ref: "#/components/schemas/ContactImportRow" }
      required: [dryRun, rows]

    DealImportRow:
      type: object
      description: A row of CSV data being imported as a deal/application. All fields are optional strings; the server validates and coerces them. accountName is matched case-insensitively to existing accounts; stage is validated against the DealStage enum. primaryContactEmail is matched case-insensitively to an existing contact's email; primaryContactName ("First Last") is matched case-insensitively against contacts on the resolved account. Either contact column is optional, but when provided the value must resolve to an existing contact.
      properties:
        name: { type: string }
        stage: { type: string }
        accountName: { type: string }
        primaryContactEmail: { type: string }
        primaryContactName: { type: string }
        owner: { type: string }
        value: { type: string }
        expectedClose: { type: string }
        gradeApplying: { type: string }
        studentLocation: { type: string }
        isSibling: { type: string }
        notes: { type: string }

    DealImportInput:
      type: object
      properties:
        dryRun: { type: boolean }
        rows:
          type: array
          items: { $ref: "#/components/schemas/DealImportRow" }
      required: [dryRun, rows]

    AccountImportRow:
      type: object
      description: A row of CSV data being imported as an account. All fields are optional strings; the server validates and coerces them.
      properties:
        name: { type: string }
        industry: { type: string }
        website: { type: string }
        phone: { type: string }
        owner: { type: string }
        size: { type: string }
        location: { type: string }
        notes: { type: string }

    AccountImportInput:
      type: object
      properties:
        dryRun: { type: boolean }
        rows:
          type: array
          items: { $ref: "#/components/schemas/AccountImportRow" }
      required: [dryRun, rows]

    CsvImportError:
      type: object
      properties:
        rowNumber: { type: integer, description: "1-based row number within the data rows (excluding header)" }
        field: { type: string, nullable: true }
        message: { type: string }
      required: [rowNumber, message]

    CsvImportReport:
      type: object
      properties:
        totalRows: { type: integer }
        validRows: { type: integer }
        insertedRows: { type: integer }
        existingRows:
          type: integer
          description: "Rows whose key (e.g. account name) already matched a record in the database and were skipped instead of being re-inserted. Always present; 0 when the importer does not dedupe."
        errorRows: { type: integer }
        dryRun: { type: boolean }
        errors:
          type: array
          items: { $ref: "#/components/schemas/CsvImportError" }
      required: [totalRows, validRows, insertedRows, existingRows, errorRows, dryRun, errors]

    LegacyOwnerSummary:
      type: object
      description: A single distinct legacy `owner` text value with how many leads/deals/activities still need a real owner.
      properties:
        legacyOwner: { type: string }
        leadCount: { type: integer }
        dealCount: { type: integer }
        activityCount: { type: integer }
        totalCount: { type: integer }
      required: [legacyOwner, leadCount, dealCount, activityCount, totalCount]

    OwnerBackfillMapping:
      type: object
      properties:
        legacyOwner: { type: string, minLength: 1 }
        ownerId: { type: string, minLength: 1, description: "Target user id from the /users directory." }
      required: [legacyOwner, ownerId]

    OwnerBackfillRequest:
      type: object
      properties:
        mappings:
          type: array
          items: { $ref: "#/components/schemas/OwnerBackfillMapping" }
      required: [mappings]

    OwnerBackfillResultEntry:
      type: object
      properties:
        legacyOwner: { type: string }
        ownerId: { type: string }
        leadsUpdated: { type: integer }
        dealsUpdated: { type: integer }
        activitiesUpdated: { type: integer }
      required: [legacyOwner, ownerId, leadsUpdated, dealsUpdated, activitiesUpdated]

    OwnerBackfillResult:
      type: object
      properties:
