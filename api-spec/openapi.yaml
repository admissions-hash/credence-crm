        templateName: { type: string }
        templateSubject: { type: string }
        delayDays: { type: integer }
      required: [id, stepOrder, templateId, templateName, templateSubject, delayDays]

    SequenceInput:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        description: { type: string, nullable: true, maxLength: 1000 }
        isActive: { type: boolean, default: true }
        steps:
          type: array
          minItems: 1
          maxItems: 50
          items: { $ref: "#/components/schemas/SequenceStepInput" }
      required: [name, steps]

    SequenceSummary:
      type: object
      properties:
