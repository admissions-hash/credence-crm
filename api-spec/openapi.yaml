openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Pipeline CRM API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: accounts
    description: Account (company) operations
  - name: contacts
    description: Contact operations
  - name: leads
    description: Lead operations
  - name: deals
    description: Deal operations
  - name: activities
    description: Activity operations
  - name: dashboard
    description: Dashboard aggregate operations
  - name: calendar
    description: Calendar (.ics) feed operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: users
    description: User directory operations
  - name: availability
    description: Staff availability settings and public meeting booking
  - name: imports
    description: CSV import audit history
  - name: owner-backfill
    description: Map legacy free-text owner strings on leads/deals/activities to real signed-in users.
  - name: search
    description: Cross-entity global search.
  - name: notes
    description: Free-form rich-text notes attached to leads, deals, accounts, and contacts.
  - name: timeline
    description: Unified record timeline mixing activities, notes, and stage changes.
  - name: custom-properties
    description: Admin-defined custom fields attached to leads, deals, accounts, and contacts.
  - name: inbox
    description: Shared email inbox — Gmail-synced threads and messages, optionally tied to a contact.
  - name: reports
    description: Saved custom reports — admin-built charts on Leads/Applications/Activities.
  - name: Storage
    description: Object storage upload and serving endpoints.
  - name: eligibility
    description: Report-card upload + admission eligibility verdict (Grades 2–12).
paths:
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UploadUrlRequest' }
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UploadUrlResponse' }
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /eligibility-checks:
    get:
      tags: [eligibility]
      operationId: listEligibilityChecks
      summary: List recent eligibility checks
      parameters:
        - in: query
          name: dealId
          required: false
          schema: { type: string, format: uuid }
          description: When provided, only checks attached to this application.
      responses:
        '200':
          description: List of eligibility checks (newest first)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/EligibilityCheck' }
    post:
      tags: [eligibility]
      operationId: createEligibilityCheck
      summary: Upload + analyse a student report card
      description: |
        Pass the `objectPath` returned from `requestUploadUrl` after the
        file has been uploaded to GCS. The server fetches the file,
        extracts marks via the Gemini multimodal model, applies the
        admission policy for the chosen grade + location, and stores the
        verdict.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EligibilityCheckInput' }
      responses:
        '201':
          description: Eligibility check created and analysed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EligibilityCheck' }
        '400':
          description: Invalid input.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '502':
          description: Failed to analyse report card.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  /eligibility-checks/{id}:
    get:
      tags: [eligibility]
      operationId: getEligibilityCheck
      summary: Fetch a single eligibility check
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: The eligibility check.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EligibilityCheck' }
        '404':
          description: Not found.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    delete:
      tags: [eligibility]
      operationId: deleteEligibilityCheck
      summary: Delete an eligibility check
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Deleted.

  /search:
    get:
      operationId: globalSearch
      tags: [search]
      summary: Cross-entity search across leads, contacts, accounts, and deals
      parameters:
        - in: query
          name: q
          schema: { type: string }
          description: Query string. Returns empty groups if shorter than 2 characters.
      responses:
        "200":
          description: Grouped search results, capped at 5 per group
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SearchResults" }

  /custom-properties:
    get:
      operationId: listCustomProperties
      tags: [custom-properties]
      summary: List custom property definitions (excludes soft-deleted)
      parameters:
        - in: query
          name: recordType
          schema: { $ref: "#/components/schemas/CustomPropertyRecordType" }
          description: When provided, only properties for that record type are returned.
      responses:
        "200":
          description: Custom property definitions
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CustomProperty" }
    post:
      operationId: createCustomProperty
      tags: [custom-properties]
      summary: Create a new custom property definition (admin-only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CustomPropertyInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CustomProperty" }
  /custom-properties/{id}:
    patch:
      operationId: updateCustomProperty
      tags: [custom-properties]
      summary: Update a custom property definition (admin-only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CustomPropertyUpdateInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CustomProperty" }
    delete:
      operationId: deleteCustomProperty
      tags: [custom-properties]
      summary: Soft-delete a custom property (admin-only). Values are retained for 30 days.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted }
  /custom-properties/reorder:
    post:
      operationId: reorderCustomProperties
      tags: [custom-properties]
      summary: Reorder custom properties for a record type (admin-only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CustomPropertyReorderInput" }
      responses:
        "200":
          description: Updated property list in the new order
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CustomProperty" }
  /custom-property-values:
    put:
      operationId: upsertCustomPropertyValues
      tags: [custom-properties]
      summary: Upsert custom property values for a single record. Pass null to clear.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CustomPropertyValuesUpsertInput" }
      responses:
        "200":
          description: Updated values map
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CustomPropertyValuesMap" }

  /email-templates:
    get:
      operationId: listEmailTemplates
      tags: [email-templates]
      summary: List all email templates
      responses:
        "200":
          description: Email templates ordered by most recently updated
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/EmailTemplate" }
    post:
      operationId: createEmailTemplate
      tags: [email-templates]
      summary: Create an email template (admin-only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EmailTemplateInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmailTemplate" }
  /email-templates/{id}:
    get:
      operationId: getEmailTemplate
      tags: [email-templates]
      summary: Get an email template
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Email template
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmailTemplate" }
    patch:
      operationId: updateEmailTemplate
      tags: [email-templates]
      summary: Update an email template (admin-only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EmailTemplateInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmailTemplate" }
    delete:
      operationId: deleteEmailTemplate
      tags: [email-templates]
      summary: Delete an email template (admin-only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted }
  /email-templates/{id}/render:
    post:
      operationId: renderEmailTemplate
      tags: [email-templates]
      summary: Render a template's subject and body with merge tags resolved against the given record context
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EmailRenderInput" }
      responses:
        "200":
          description: Rendered subject + body, plus the resolved recipient (if any)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmailRenderOutput" }
  /email-sends:
    post:
      operationId: logEmailSend
      tags: [email-templates]
      summary: Send an outbound email (via Gmail when connected, otherwise just log) and record it on the linked records
      description: |
        When `transport` is `gmail` and the Gmail connector is authorized for
        this workspace, the email is sent through the Gmail API and the send is
        logged as a completed `email` activity. When `transport` is `mailto`
        (the default), delivery is the user's responsibility (their mail client
        opens client-side via `mailto:`) and this endpoint only records the
        send as a completed `email` activity for the timeline.

        If `transport` is `gmail` but no Gmail connection is available, the
        endpoint responds with `412 Precondition Failed` so the client can fall
        back to the mailto path.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EmailSendInput" }
      responses:
        "201":
          description: Email sent (when transport=gmail) or logged (when transport=mailto), plus the resulting activity entry
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmailSendOutput" }
        "412":
          description: Gmail transport requested but no Gmail connection is available
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
                  gmailAvailable: { type: boolean }
                required: [error, gmailAvailable]
  /email-transport:
    get:
      operationId: getEmailTransport
      tags: [email-templates]
      summary: Report which email send transports are available
      responses:
        "200":
          description: Transport availability
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmailTransportStatus" }

  /availability:
    get:
      operationId: getAvailability
      tags: [availability]
      summary: Get the signed-in user's availability settings
      responses:
        "200":
          description: Availability settings
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AvailabilitySettings" }
        "404": { description: Not configured yet }
    put:
      operationId: upsertAvailability
      tags: [availability]
      summary: Create or update the signed-in user's availability settings
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AvailabilityInput" }
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AvailabilitySettings" }
  /availability/bookings/upcoming:
    get:
      operationId: getUpcomingBookings
      tags: [availability]
      summary: List the signed-in user's upcoming confirmed bookings
      responses:
        "200":
          description: Upcoming bookings
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Booking" }
  /availability/calendar-status:
    get:
      operationId: getCalendarStatus
      tags: [availability]
      summary: Report whether Google Calendar is connected for the signed-in staff user
      responses:
        "200":
          description: Calendar status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CalendarStatus" }

  /book/{slug}:
    get:
      operationId: getPublicBookingPage
      tags: [availability]
      summary: Public — staff name and meeting metadata for a booking link
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Booking page metadata
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicBookingPage" }
        "404": { description: Unknown slug }
    post:
      operationId: createPublicBooking
      tags: [availability]
      summary: Public — book a meeting slot
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PublicBookingInput" }
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicBookingResult" }
        "409": { description: Slot is no longer available }
  /book/{slug}/slots:
    get:
      operationId: getBookingSlots
      tags: [availability]
      summary: Public — list bookable slots (next 14 days) for a staff link
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Available slots
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicBookingSlots" }

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /accounts/export.csv:
    get:
      operationId: exportAccountsCsv
      tags: [accounts]
      summary: Export accounts as CSV
      parameters:
        - in: query
          name: search
          schema: { type: string }
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema: { type: string }
  /accounts/import:
    post:
      operationId: importAccounts
      tags: [accounts]
      summary: Import accounts from parsed CSV rows (preview with dryRun=true)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AccountImportInput" }
      responses:
        "200":
          description: Import report
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CsvImportReport" }

  /accounts:
    get:
      operationId: listAccounts
      tags: [accounts]
      summary: List accounts
      parameters:
        - in: query
          name: search
          schema: { type: string }
      responses:
        "200":
          description: List of accounts
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Account" }
    post:
      operationId: createAccount
      tags: [accounts]
      summary: Create account
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AccountInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Account" }
  /accounts/{id}:
    get:
      operationId: getAccount
      tags: [accounts]
      summary: Get account with related contacts and deals
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Account detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AccountDetail" }
    patch:
      operationId: updateAccount
      tags: [accounts]
      summary: Update account
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AccountInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Account" }
    delete:
      operationId: deleteAccount
      tags: [accounts]
      summary: Delete account
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /contacts/export.csv:
    get:
      operationId: exportContactsCsv
      tags: [contacts]
      summary: Export contacts as CSV
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: accountId
          schema: { type: string }
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema: { type: string }
  /contacts/import:
    post:
      operationId: importContacts
      tags: [contacts]
      summary: Import contacts from parsed CSV rows (preview with dryRun=true)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ContactImportInput" }
      responses:
        "200":
          description: Import report
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CsvImportReport" }

  /contacts:
    get:
      operationId: listContacts
      tags: [contacts]
      summary: List contacts
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: accountId
          schema: { type: string }
      responses:
        "200":
          description: List of contacts
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Contact" }
    post:
      operationId: createContact
      tags: [contacts]
      summary: Create contact
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ContactInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Contact" }
  /contacts/{id}/lifecycle:
    patch:
      operationId: setContactLifecycleStage
      tags: [contacts]
      summary: Manually set a contact's lifecycle stage (admin only)
      description: |
        Manual lifecycle overrides are admin-only. Day-to-day forward
        progression happens automatically as deals are created and won;
        this endpoint is reserved for admins to correct mistakes or jump
        stages out of band.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LifecycleStageInput" }
      responses:
        "200":
          description: Updated contact
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Contact" }
        "403":
          description: Caller is not an admin

  /contacts/{id}/lifecycle-history:
    get:
      operationId: getContactLifecycleHistory
      tags: [contacts]
      summary: Get the lifecycle change history for a contact
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Lifecycle history entries (newest first)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/LifecycleHistoryEntry" }

  /contacts/{id}:
    get:
      operationId: getContact
      tags: [contacts]
      summary: Get contact
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Contact
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Contact" }
    patch:
      operationId: updateContact
      tags: [contacts]
      summary: Update contact
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ContactInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Contact" }
    delete:
      operationId: deleteContact
      tags: [contacts]
      summary: Delete contact
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /leads/export.csv:
    get:
      operationId: exportLeadsCsv
      tags: [leads]
      summary: Export leads as CSV
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: status
          schema: { $ref: "#/components/schemas/LeadStatus" }
        - in: query
          name: source
          schema: { type: string }
        - in: query
          name: owner
          schema: { type: string }
        - in: query
          name: ownerId
          schema: { type: string }
        - in: query
          name: mine
          schema: { type: boolean }
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema: { type: string }
  /leads/import:
    post:
      operationId: importLeads
      tags: [leads]
      summary: Import leads from parsed CSV rows (preview with dryRun=true)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LeadImportInput" }
      responses:
        "200":
          description: Import report
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CsvImportReport" }

  /leads:
    get:
      operationId: listLeads
      tags: [leads]
      summary: List leads
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: status
          schema: { $ref: "#/components/schemas/LeadStatus" }
        - in: query
          name: source
          schema: { type: string }
        - in: query
          name: ownerId
          schema: { type: string }
        - in: query
          name: mine
          schema: { type: boolean }
        - in: query
          name: minScore
          description: Only return leads whose score is >= this value (0-100).
          schema: { type: integer, minimum: 0, maximum: 100 }
        - in: query
          name: hot
          description: Shortcut for the Hot band threshold (score >= 70).
          schema: { type: boolean }
        - in: query
          name: sort
          description: |
            Sort order. `score` sorts highest score first; default is most
            recently created.
          schema: { type: string, enum: [created, score] }
      responses:
        "200":
          description: List of leads
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Lead" }
    post:
      operationId: createLead
      tags: [leads]
      summary: Create lead
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LeadInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Lead" }
  /leads/{id}:
    get:
      operationId: getLead
      tags: [leads]
      summary: Get lead
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Lead
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Lead" }
    patch:
      operationId: updateLead
      tags: [leads]
      summary: Update lead
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
