        key: { type: string }
        name: { type: string }
        type: { $ref: "#/components/schemas/CustomPropertyType" }
        required: { type: boolean }
        options:
          type: array
          nullable: true
          items: { type: string }
        displayOrder: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required:
        - id
        - recordType
        - key
        - name
        - type
        - required
        - displayOrder
        - createdAt
        - updatedAt

    CustomPropertyInput:
      type: object
      properties:
        recordType: { $ref: "#/components/schemas/CustomPropertyRecordType" }
        name: { type: string, minLength: 1 }
        type: { $ref: "#/components/schemas/CustomPropertyType" }
        required: { type: boolean }
        options:
          type: array
          nullable: true
          items: { type: string, minLength: 1 }
      required: [recordType, name, type]

    CustomPropertyUpdateInput:
      type: object
      description: Partial update — recordType and key cannot be changed.
      properties:
        name: { type: string, minLength: 1 }
        required: { type: boolean }
        options:
          type: array
          nullable: true
          items: { type: string, minLength: 1 }

    CustomPropertyReorderInput:
      type: object
      properties:
        recordType: { $ref: "#/components/schemas/CustomPropertyRecordType" }
        propertyIds:
          type: array
          items: { type: string, format: uuid }
      required: [recordType, propertyIds]

    CustomPropertyValuesMap:
      type: object
      description: Map keyed by custom property `key`. Values may be string, number, boolean, ISO date string, string[], or null.
      additionalProperties: true

    CustomPropertyValuesUpsertInput:
      type: object
      properties:
        recordType: { $ref: "#/components/schemas/CustomPropertyRecordType" }
        recordId: { type: string, format: uuid }
        values:
          $ref: "#/components/schemas/CustomPropertyValuesMap"
      required: [recordType, recordId, values]

    CsvImportRecord:
