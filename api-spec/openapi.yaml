        totalRows: { type: integer }
        validRows: { type: integer }
        insertedRows: { type: integer }
        errorRows: { type: integer }
        errors:
          type: array
          items: { $ref: "#/components/schemas/CsvImportError" }
      required:
        - id
        - entity
        - importedAt
        - totalRows
        - validRows
        - insertedRows
        - errorRows
        - errors

    EmailTemplate:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        subject: { type: string }
        bodyHtml: { type: string }
        createdById: { type: string, nullable: true }
        createdByName: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
