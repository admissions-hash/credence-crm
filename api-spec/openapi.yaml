        blank in the rendered output.
      properties:
        leadId: { type: string, format: uuid, nullable: true }
        contactId: { type: string, format: uuid, nullable: true }
        dealId: { type: string, format: uuid, nullable: true }
        accountId: { type: string, format: uuid, nullable: true }

    EmailRenderOutput:
      type: object
      properties:
        subject: { type: string }
        bodyHtml: { type: string }
        to: { type: string, nullable: true, description: "Best-guess recipient email derived from the contact or lead." }
        unresolvedTags:
          type: array
          description: Merge tags that could not be resolved (rendered as empty strings).
          items: { type: string }
      required: [subject, bodyHtml, unresolvedTags]

    EmailSendInput:
      type: object
      properties:
        to: { type: string, minLength: 1 }
        subject: { type: string, minLength: 1 }
        bodyHtml: { type: string, minLength: 1 }
        templateId: { type: string, format: uuid, nullable: true }
        leadId: { type: string, format: uuid, nullable: true }
        contactId: { type: string, format: uuid, nullable: true }
